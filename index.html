<!DOCTYPE html>
<html lang="en">
<head>
    <title>The Vault</title>

    <!-- so that the js knows which page it's on -->
    <meta name="page-id" content="index">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">

    <!-- CSS Stylesheet -->
    <link rel="stylesheet" type="text/css" href="style.css">

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- Javascript -->
    <script src="script.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- store the cover template -->
    <template id="cover-template">
        <div class="cover">
                <div class="inner">
                    <h3 class="cover-title">title</h3>
                    <p class="cover-blurb">blurb content</p>
                </div>
            </div>
    </template>

    <!-- store the error message in case books/directory.json can't be found -->
    <template>
        <p>books/directory.json can't be found, whoever made this website needs to lock in</p>
    </template>

    <header id="header">
        <h1>The Vault</h1>
        <i>hosting the writings of Mattie Lang</i>
    </header>
    <main>
        <div class="background" id="background">
            <!-- script.js will fill this with covers from the template -->
        </div>
    </main>
    <footer>
        <p>&copy; Max Lang 2026</p>
    </footer>
</body>
</html>
